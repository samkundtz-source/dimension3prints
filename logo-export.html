<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; }
  canvas { border: 1px solid #333; }
</style>
</head>
<body>
<canvas id="c" width="1080" height="1080"></canvas>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const s = 1080;

// Background
ctx.fillStyle = '#050505';
ctx.fillRect(0, 0, s, s);

const cx = s / 2;
const cy = s / 2;
const scale = 11;

// Hexagon points (outer)
function hexPoints(cxp, cyp, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 3) * i - Math.PI / 2;
    pts.push({ x: cxp + r * Math.cos(angle), y: cyp + r * Math.sin(angle) });
  }
  return pts;
}

// Outer hex
const outerR = 15 * scale;
const outerPts = hexPoints(cx, cy, outerR);

ctx.beginPath();
ctx.moveTo(outerPts[0].x, outerPts[0].y);
for (let i = 1; i < 6; i++) ctx.lineTo(outerPts[i].x, outerPts[i].y);
ctx.closePath();
ctx.strokeStyle = '#ffffff';
ctx.lineWidth = 2.5 * scale;
ctx.stroke();

// Inner hex (filled, semi-transparent)
const innerR = 8 * scale;
const innerPts = hexPoints(cx, cy, innerR);

ctx.beginPath();
ctx.moveTo(innerPts[0].x, innerPts[0].y);
for (let i = 1; i < 6; i++) ctx.lineTo(innerPts[i].x, innerPts[i].y);
ctx.closePath();
ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
ctx.fill();

// Download button
const btn = document.createElement('button');
btn.textContent = 'Download PNG (1080x1080)';
btn.style.cssText = 'position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:#fff;color:#000;border:none;border-radius:10px;padding:16px 32px;font-size:16px;font-weight:700;cursor:pointer;font-family:system-ui';
btn.onclick = () => {
  const a = document.createElement('a');
  a.download = 'cities3ds-logo.png';
  a.href = c.toDataURL('image/png');
  a.click();
};
document.body.appendChild(btn);
</script>
</body>
</html>
